# Netlify configuration for SPA routing
[build]
  publish = "dist"
  command = "npm run build"
  functions = "netlify/functions"

# API endpoint routing for webhooks (must be before catch-all)
# Force=true ensures this takes precedence over SPA routing
[[redirects]]
  from = "/api/webhooks/meta"
  to = "/.netlify/functions/meta-webhook"
  status = 200
  force = true

# Redirect all routes to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
